trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build
    displayName: 'Install & Build'
    jobs:
      - job: BackendBuild
        displayName: 'Backend (Node.js/Express)'
        steps:
          - task: UseNode@1
            inputs:
              version: '20.x'
            displayName: 'Install Node.js'

          - script: npm install
            displayName: 'Install backend dependencies'

          - script: npm run build
            displayName: 'Backend build (no-op for Node.js)'

      - job: FrontendBuild
        displayName: 'Frontend (React/Vite Dashboard)'
        steps:
          - task: UseNode@1
            inputs:
              version: '20.x'
            displayName: 'Install Node.js'

          - script: npm install
            workingDirectory: saas-dashboard
            displayName: 'Install frontend dependencies'

          - script: npm run build
            workingDirectory: saas-dashboard
            displayName: 'Build React dashboard'

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: 'saas-dashboard/dist'
              artifactName: 'frontend-dist'
            displayName: 'Publish frontend build artifacts'
