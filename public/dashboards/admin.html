<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/images/techserve-logo.svg" type="image/svg+xml" sizes="any">
  <title>Admin Dashboard - TechServe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

  <nav class="navbar app-navbar navbar-expand-lg flex-md-nowrap p-0 shadow-sm">
    <div class="container-fluid px-0">
      <div class="d-flex align-items-center col-md-3 col-lg-2 px-3 py-2 border-end" style="border-color: var(--border) !important;">
        <a class="navbar-brand d-flex align-items-center gap-2 mb-0 py-0" href="/index.html" title="Back to website">
          <img class="brand-logo brand-logo--sm" src="/images/techserve-logo.svg" alt="" width="32" height="32">
          <span class="d-flex flex-column lh-sm">
            <span class="fw-bold text-dark" style="font-family: var(--font-display); font-size: 1rem;">TechServe</span>
            <small class="text-muted" style="font-size: 0.65rem; letter-spacing: 0.04em;">ADMIN</small>
          </span>
        </a>
      </div>
      <div class="d-flex flex-grow-1 align-items-center justify-content-end px-3 py-2 gap-2 flex-wrap">
        <a class="btn btn-sm btn-outline-secondary" href="/index.html">Website</a>
        <span class="text-secondary small me-1 d-none d-sm-inline" id="userNameDisplay"></span>
        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="logout()">Sign out</button>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-white sidebar collapse shadow-sm pt-3">
        <div class="position-sticky">
          <ul class="nav flex-column">
            <li class="nav-item">
              <a class="nav-link sidebar-link active" href="#" id="view-all-reqs-tab">All Requests</a>
            </li>
          </ul>
        </div>
      </nav>

      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4 app-main">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center mb-3">
          <h1 class="h2">Service Requests Overview</h1>
        </div>

        <div class="row g-2 mb-3 align-items-end table-card p-3">
          <div class="col-md-3">
            <label class="form-label small text-muted mb-0">Status</label>
            <select class="form-select form-select-sm" id="filterStatus">
              <option value="">All</option>
              <option value="Pending Approval">Pending Approval</option>
              <option value="Assigned">Assigned</option>
              <option value="In Development">In Development</option>
              <option value="In Testing">In Testing</option>
              <option value="Ready for Delivery">Ready for Delivery</option>
              <option value="Completed">Completed</option>
              <option value="Rejected">Rejected</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label small text-muted mb-0">Priority</label>
            <select class="form-select form-select-sm" id="filterPriority">
              <option value="">All</option>
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label small text-muted mb-0">Sort by</label>
            <select class="form-select form-select-sm" id="filterSort">
              <option value="createdAt">Created</option>
              <option value="priority">Priority</option>
              <option value="status">Status</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label small text-muted mb-0">Order</label>
            <select class="form-select form-select-sm" id="filterOrder">
              <option value="desc">Newest first</option>
              <option value="asc">Oldest first</option>
            </select>
          </div>
          <div class="col-md-3 text-md-end">
            <button type="button" class="btn btn-sm btn-primary" id="applyFiltersBtn">Apply filters</button>
            <button type="button" class="btn btn-sm btn-outline-secondary" id="clearFiltersBtn">Clear</button>
          </div>
        </div>
        
        <div class="table-responsive table-card p-3">
          <table class="table table-hover align-middle">
            <thead class="table-dark">
              <tr>
                <th>Req ID</th>
                <th>Client</th>
                <th>Service Type</th>
                <th>Status</th>
                <th>Dev</th>
                <th>Tester</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="adminTableBody">
              <!-- Admin Data Populated Here -->
            </tbody>
          </table>
        </div>

        <!-- Assignment Modal -->
        <div class="modal fade" id="assignModal" tabindex="-1">
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Manage Request</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body">
                <form id="assignForm">
                  <input type="hidden" id="manageReqId">
                  
                  <div class="mb-3">
                    <label class="form-label">Status</label>
                    <select class="form-select" id="manageStatus">
                      <option value="Pending Approval">Pending Approval</option>
                      <option value="Assigned">Assigned</option>
                      <option value="In Development">In Development</option>
                      <option value="In Testing">In Testing</option>
                      <option value="Ready for Delivery">Ready for Delivery</option>
                      <option value="Completed">Completed</option>
                      <option value="Rejected">Rejected</option>
                    </select>
                  </div>

                  <div class="mb-3">
                    <label class="form-label">Assign Developer</label>
                    <select class="form-select" id="manageDev">
                      <option value="">-- Unassigned --</option>
                    </select>
                  </div>
                  
                  <div class="mb-3">
                    <label class="form-label">Assign Tester</label>
                    <select class="form-select" id="manageTester">
                      <option value="">-- Unassigned --</option>
                    </select>
                  </div>

                  <button type="submit" class="btn btn-primary w-100">Save Changes</button>
                </form>
              </div>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
