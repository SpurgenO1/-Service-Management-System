<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tester Dashboard - TechServe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-secondary flex-md-nowrap p-0 shadow">
    <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3 fw-bold" href="#">TechServe QA</a>
    <div class="navbar-nav w-100 d-flex justify-content-end px-3">
      <div class="nav-item text-nowrap">
        <span class="text-white me-3" id="userNameDisplay"></span>
        <button class="btn btn-sm btn-outline-light" onclick="logout()">Sign out</button>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-white sidebar collapse shadow-sm pt-3">
        <div class="position-sticky">
          <ul class="nav flex-column">
            <li class="nav-item">
              <a class="nav-link sidebar-link active" href="#">Tasks to Test</a>
            </li>
          </ul>
        </div>
      </nav>

      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center mb-3">
          <h1 class="h2">Quality Assurance Tasks</h1>
        </div>
        
        <div class="row" id="testerTasksContainer">
          <!-- Tester tasks cards go here -->
        </div>

        <!-- Bug Report Modal -->
        <div class="modal fade" id="bugModal" tabindex="-1">
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Report Bugs</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body">
                <form id="bugForm">
                  <input type="hidden" id="bugReqId">
                  <div class="mb-3">
                    <label class="form-label">Bug Details</label>
                    <textarea class="form-control" id="bugDetails" rows="4" required></textarea>
                  </div>
                  <button type="submit" class="btn btn-danger w-100">Send Back to Developer</button>
                </form>
              </div>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/tester.js"></script>
</body>
</html>
