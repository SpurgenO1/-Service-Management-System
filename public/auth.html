<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/images/techserve-logo.svg" type="image/svg+xml" sizes="any">
  <title>Sign in — TechServe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body class="site-auth site-public d-flex flex-column min-vh-100" data-page="auth">
  <div id="site-header-mount"></div>

  <main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
          <div class="auth-card bg-white">
            <div class="px-4 pt-4">
              <h1 class="h4 fw-bold mb-1">Welcome back</h1>
              <p class="text-muted small mb-0">Sign in or create a client account.</p>
            </div>
            <ul class="nav nav-tabs px-3 pt-3 mt-2" id="authTab" role="tablist">
              <li class="nav-item flex-fill text-center" role="presentation">
                <button class="nav-link w-100 active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" type="button" role="tab">Sign in</button>
              </li>
              <li class="nav-item flex-fill text-center" role="presentation">
                <button class="nav-link w-100" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane" type="button" role="tab">Register</button>
              </li>
            </ul>
            <div class="card-body p-4">
              <div id="alert-container"></div>

              <div class="tab-content">
                <div class="tab-pane fade show active" id="login-pane" role="tabpanel">
                  <form id="loginForm">
                    <div class="mb-3">
                      <label class="form-label small fw-semibold" for="loginEmail">Email</label>
                      <input type="email" class="form-control form-control-lg" id="loginEmail" required autocomplete="username">
                    </div>
                    <div class="mb-3">
                      <label class="form-label small fw-semibold" for="loginPassword">Password</label>
                      <input type="password" class="form-control form-control-lg" id="loginPassword" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg">Sign in</button>
                    <p class="mt-3 mb-0 text-center small"><a href="/forgot-password.html" class="link-on-light">Forgot password?</a></p>
                  </form>
                </div>

                <div class="tab-pane fade" id="register-pane" role="tabpanel">
                  <form id="registerForm">
                    <div class="mb-3">
                      <label class="form-label small fw-semibold" for="regName">Full name</label>
                      <input type="text" class="form-control form-control-lg" id="regName" required autocomplete="name">
                    </div>
                    <div class="mb-3">
                      <label class="form-label small fw-semibold" for="regEmail">Email</label>
                      <input type="email" class="form-control form-control-lg" id="regEmail" required autocomplete="email">
                    </div>
                    <div class="mb-3">
                      <label class="form-label small fw-semibold" for="regPassword">Password</label>
                      <input type="password" class="form-control form-control-lg" id="regPassword" required minlength="8" autocomplete="new-password">
                      <div class="form-text">At least 8 characters.</div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 btn-lg">Create account</button>
                  </form>
                </div>
              </div>
            </div>
          </div>
          <p class="text-center text-muted small mt-4 mb-0">Staff accounts are issued by your administrator.</p>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer-mount"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/site-chrome.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
