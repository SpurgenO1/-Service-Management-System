<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/images/techserve-logo.svg" type="image/svg+xml" sizes="any">
  <title>Forgot password — TechServe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body class="site-auth site-public d-flex flex-column min-vh-100" data-page="auth">
  <div id="site-header-mount"></div>

  <main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
          <div class="auth-card bg-white p-4 p-md-5">
            <h1 class="h4 fw-bold mb-2">Reset password</h1>
            <p class="text-muted small mb-4">Enter your email. If an account exists, we’ll send instructions (or log a link if email isn’t configured).</p>
            <div id="alert-container"></div>
            <form id="forgotForm">
              <div class="mb-3">
                <label class="form-label small fw-semibold" for="forgotEmail">Email</label>
                <input type="email" class="form-control form-control-lg" id="forgotEmail" required autocomplete="email">
              </div>
              <button type="submit" class="btn btn-primary w-100 btn-lg">Send reset link</button>
            </form>
            <p class="text-center mt-4 mb-0"><a href="/auth.html" class="small link-on-light">Back to sign in</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer-mount"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/site-chrome.js"></script>
  <script src="/js/forgot-password.js"></script>
</body>
</html>
